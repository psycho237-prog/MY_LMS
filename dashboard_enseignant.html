<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONDA WORKPLACE - Espace Enseignant</title>
    <!-- Teacher account (enseignant@lms.com / 1234) allows teachers to create courses, add/edit lessons (PDF, video), and use the class chat -->
<!-- Projet etudiant de ONANA GREGOIRE LEGRAND (24G2060) -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>FONDA WORKPLACE</h1>
        <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;">
            <div style="position:relative;">
                <input type="text" id="input_recherche" placeholder="🔍 Rechercher..." oninput="rechercheGlobale(this.value)" style="padding: 6px 12px; border-radius: 20px; border: none; font-size: 0.9rem; width: 200px;">
                <div id="dropdown_recherche" style="display:none; position:absolute; top:36px; left:0; width:300px; background:white; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.15); z-index:1000; max-height:250px; overflow-y:auto;"></div>
            </div>
            <div style="position:relative;">
                <button onclick="toggleNotifications()" style="background:none;border:none;cursor:pointer;font-size:1.3rem;position:relative;" title="Notifications">
                    🔔 <span id="badge_notif" style="display:none;position:absolute;top:-5px;right:-5px;background:red;color:white;border-radius:50%;width:18px;height:18px;font-size:0.65rem;line-height:18px;text-align:center;">0</span>
                </button>
                <div id="dropdown_notif" style="display:none;position:absolute;top:40px;right:0;width:300px;background:white;border-radius:8px;box-shadow:0 4px 15px rgba(0,0,0,0.15);z-index:1000;padding:10px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><strong>Notifications</strong><button onclick="marquerToutLu()" style="font-size:0.75rem;background:none;border:none;color:#0056b3;cursor:pointer;">Tout lire</button></div>
                    <div id="liste_notif">Chargement...</div>
                </div>
            </div>
            <a href="profil.html" style="color:white;font-size:1.3rem;text-decoration:none;" title="Mon profil">👤</a>
            <span id="nom_utilisateur" style="font-weight: bold;"></span>
            <button onclick="deconnexion()" class="btn-quitter">Déconnexion</button>
        </div>
    </div>

    <div class="contenu-principal">
        <h2>Gestion des Cours</h2>
        <p>Voici vos cours et leçons à gérer.</p>
        <!-- Button to open the course creation modal -->
        <button class="btn-ajouter-cours" onclick="ouvrirAjoutCours()" style="margin-bottom:10px; background:#28a745; color:white; border:none; padding:8px 12px; cursor:pointer; border-radius: 5px;">Ajouter un cours</button>
        
        <div class="liste-cours" id="mes_cours">
            <div style="text-align:center; width: 100%;">
                Chargement des cours...
            </div>
        </div>
    </div>

    <!-- Modal pour les lecons -->
    <div id="lecon_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 800px;">
            <span class="close-btn" onclick="fermerModal('lecon_modal')">&times;</span>
            <h2 id="modal_titre">Gérer les leçons</h2>
            
            <div style="border-bottom: 1px solid #ccc; margin-bottom: 20px; padding-bottom: 20px;">
                <h3>Ajouter une nouvelle leçon</h3>
                <form id="form_ajout_lecon" onsubmit="ajouterLecon(event)">
                    <input type="hidden" id="cours_id_actif">
                    <div class="champ">
                        <label>Titre de la leçon :</label>
                        <input type="text" id="lecon_titre" required>
                    </div>
                    <div class="champ">
                        <label>Type :</label>
                        <select id="lecon_type" required>
                            <option value="pdf">Document (PDF/DOCX)</option>
                            <option value="video">Vidéo (MP4)</option>
                        </select>
                    </div>
                    <div class="champ">
                        <label>Source :</label>
                        <select id="lecon_source" onchange="changerSourceLecon()">
                            <option value="fichier">Upload Fichier</option>
                            <option value="url">Lien URL (ex: YouTube)</option>
                        </select>
                    </div>
                    <div class="champ" id="champ_fichier">
                        <label>Fichier :</label>
                        <input type="file" id="lecon_fichier" accept=".pdf,.doc,.docx,.mp4">
                    </div>
                    <div class="champ" id="champ_url" style="display:none;">
                        <label>Lien URL :</label>
                        <input type="url" id="lecon_url" placeholder="https://...">
                    </div>
                    <button type="submit">Ajouter</button>
                    <p id="lecon_msg"></p>
                </form>
            </div>

            <h3>Leçons existantes</h3>
            <div id="modal_contenu">
                <!-- Les leçons s'afficheront ici -->
            </div>
        </div>
    </div>

    <!-- Modal: Add Course -->
    <div id="cours_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('cours_modal')">&times;</span>
            <h2 id="modal_titre_cours">Ajouter un cours</h2>
            <form id="form_ajout_cours" onsubmit="ajouterCours(event)">
                <div class="champ">
                    <label>Module :</label>
                    <select id="cours_module_id" required>
                        <option value="">Sélectionnez un module...</option>
                    </select>
                </div>
                <div class="champ">
                    <label>Titre du cours :</label>
                    <input type="text" id="cours_titre" required>
                </div>
                <div class="champ">
                    <label>Description :</label>
                    <textarea id="cours_description" required></textarea>
                </div>
                <button type="submit">Ajouter</button>
                <p id="cours_msg"></p>
            </form>
        </div>
    </div>



    <!-- Modal pour le chat (Classe) -->
    <div id="chat_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('chat_modal')">&times;</span>
            <h2 id="chat_titre">Classe : Chat</h2>
            
            <div id="chat_messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: #fafafa;">
                <!-- Messages affichés ici -->
            </div>

            <form onsubmit="envoyerMessage(event, 'enseignant')">
                <input type="hidden" id="chat_cours_id">
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="chat_input" required placeholder="Votre message..." style="flex:1; padding:10px; border:1px solid #ccc;">
                    <button type="submit" style="padding:10px 20px; background:#0056b3; color:white; border:none; cursor:pointer;">Envoyer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal pour les quiz -->
    <div id="quiz_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('quiz_modal')">&times;</span>
            <h2 id="quiz_titre_modal">Ajouter un quiz à la leçon</h2>
            <form id="form_ajout_quiz" onsubmit="ajouterQuiz(event)">
                <input type="hidden" id="quiz_lecon_id">
                <div class="champ">
                    <label>Titre du Quiz :</label>
                    <input type="text" id="quiz_titre" required>
                </div>
                <div style="display:flex; gap:10px;">
                    <div class="champ" style="flex:1;">
                        <label>Durée (minutes, 0 = illimité) :</label>
                        <input type="number" id="quiz_duree" min="0" value="0" required>
                    </div>
                    <div class="champ" style="flex:1;">
                        <label>Score minimum requis (%) :</label>
                        <input type="number" id="quiz_seuil" min="1" max="100" value="50" required>
                    </div>
                </div>
                <div class="champ">
                    <label>Questions :</label>
                    <div id="quiz_builder" style="border: 1px solid #ccc; padding: 10px; background: #f9f9f9; max-height: 400px; overflow-y: auto;">
                        <!-- Questions ajoutées dynamiquement -->
                    </div>
                    <button type="button" onclick="ajouterQuestionBuilder()" style="margin-top:10px; background:#28a745; color:white; border:none; padding:8px 12px; cursor:pointer; border-radius:3px;">+ Ajouter une question</button>
                </div>
                <button type="submit" id="btn_submit_quiz" style="margin-top:20px;">Ajouter le quiz</button>
                <p id="quiz_msg"></p>
            </form>
        </div>
    </div>

    <!-- Modal Commentaires / Q&A -->
    <div id="reponses_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 650px;">
            <span class="close-btn" onclick="fermerModal('reponses_modal')">&times;</span>
            <h2>💬 Répondre aux questions</h2>
            <input type="hidden" id="rep_lecon_id">
            <div id="liste_reponses" style="max-height:400px; overflow-y:auto; margin-bottom:15px; padding-right:5px;"></div>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/enseignant.js"></script>
</body>
</html>
