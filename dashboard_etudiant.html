<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FONDA WORKPLACE - Espace Étudiant</title>
    <!-- Projet etudiant de ONANA GREGOIRE LEGRAND (24G2060) -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="navbar">
        <h1>FONDA WORKPLACE</h1>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <span id="nom_utilisateur" style="font-weight: bold;"></span>
            <button onclick="deconnexion()" class="btn-quitter">Déconnexion</button>
        </div>
    </div>

    <div class="contenu-principal">
        <h2>Mes Modules et Cours</h2>
        <p>Voici les cours disponibles pour votre apprentissage.</p>
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <button class="btn-cours" style="background-color:#17a2b8;" onclick="afficherProgression()">Mes Notes</button>
            <button class="btn-cours" style="background-color:#d4af37; color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;" onclick="genererCertificats()">Obtenir mes Certificats</button>
        </div>
        
        <div style="margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 5px; border: 1px solid #ddd;">
            <h3 style="margin-top:0;">Progression Globale</h3>
            <div style="width: 100%; background-color: #e9ecef; border-radius: 5px; overflow: hidden; margin-top: 10px;">
                <div id="barre_progression_globale" style="width: 0%; height: 20px; background-color: #28a745; text-align: center; color: white; line-height: 20px; font-size: 12px;">0%</div>
            </div>
        </div>

        <div class="liste-cours" id="mes_cours">
            <div style="text-align:center; width: 100%;">
                Chargement des cours...
            </div>
        </div>
    </div>

    <!-- Modal pour les lecons -->
    <div id="lecon_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 800px;">
            <span class="close-btn" onclick="fermerModal('lecon_modal')">&times;</span>
            <h2 id="modal_titre">Titre du cours</h2>
            <div id="modal_contenu">
                <!-- Les leçons s'afficheront ici -->
            </div>
        </div>
    </div>

    <!-- Modal pour le chat (Classe) -->
    <div id="chat_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('chat_modal')">&times;</span>
            <h2 id="chat_titre">Classe : Chat</h2>
            
            <div id="chat_messages" style="height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background: #fafafa;">
                <!-- Messages affichés ici -->
            </div>

            <form onsubmit="envoyerMessage(event, 'etudiant')">
                <input type="hidden" id="chat_cours_id">
                <div style="display:flex; gap: 10px;">
                    <input type="text" id="chat_input" required placeholder="Votre message..." style="flex:1; padding:10px; border:1px solid #ccc;">
                    <button type="submit" style="padding:10px 20px; background:#0056b3; color:white; border:none; cursor:pointer;">Envoyer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal pour la progression -->
    <div id="progression_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('progression_modal')">&times;</span>
            <h2>Mes Notes</h2>
            <div id="progression_contenu" style="margin-top: 15px;">
            </div>
        </div>
    </div>

    <!-- Modal Lecteur Vidéo -->
    <div id="video_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 800px; text-align: center;">
            <span class="close-btn" onclick="fermerModalVideo()">&times;</span>
            <h2 id="video_titre">Titre de la vidéo</h2>
            <input type="hidden" id="video_lecon_id">
            <video id="lecteur_video" width="100%" controls ontimeupdate="majProgressionVideo()">
                <source id="video_source" src="" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
            <p id="video_progression_text" style="font-weight: bold; margin-top: 10px;">Visionné : 0%</p>
        </div>
    </div>

    <!-- Modal Passer le Quiz -->
    <div id="passer_quiz_modal" class="modal">
        <div class="modal-content" style="width: 80%; max-width: 600px;">
            <span class="close-btn" onclick="fermerModal('passer_quiz_modal')">&times;</span>
            <h2 id="titre_quiz_etudiant">Quiz</h2>
            <input type="hidden" id="passer_quiz_eval_id">
            <input type="hidden" id="passer_quiz_lecon_id">
            <div id="contenu_quiz_etudiant" style="margin-top: 15px; text-align: left;">
            </div>
            <button id="btn_valider_quiz" style="display:none; margin-top:20px; background:#28a745; color:white; border:none; padding:10px; cursor:pointer; border-radius: 5px;" onclick="soumettreQuiz()">Valider mes réponses</button>
            <p id="quiz_resultat_msg"></p>
        </div>
    </div>

    <script src="assets/js/auth.js"></script>
    <script src="assets/js/etudiant.js"></script>
</body>
</html>
