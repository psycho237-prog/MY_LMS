<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY LMS - Connexion / Inscription</title>
    <!-- Auteur: ONANA GREGOIRE LEGRAND -->
    <!-- Matricule: 24G2060 -->
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .toggle-btn {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            text-decoration: underline;
            margin-top: 15px;
            font-size: 0.9rem;
            display: block;
            text-align: center;
            width: 100%;
        }
        select {
            width: 100%;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--light);
            font-size: 1rem;
            transition: 0.3s ease;
        }
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
        }
        select option {
            background: var(--dark);
            color: var(--light);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="boite-connexion">
            <h2>MY LMS</h2>
            <p id="form_title">Connectez-vous à votre espace d'apprentissage.</p>
            
            <!-- FORMULAIRE DE CONNEXION -->
            <form id="form_login" onsubmit="verifierConnexion(event)">
                <div class="champ">
                    <label>Adresse Email :</label>
                    <input type="email" id="email" required placeholder="Ex: etudiant@lms.com">
                </div>
                
                <div class="champ">
                    <label>Mot de passe :</label>
                    <input type="password" id="mdp" required placeholder="Votre mot de passe">
                </div>
                
                <p id="erreur_msg" style="color:var(--danger); display:none; font-size:14px; text-align:center;">Identifiants incorrects !</p>
                
                <button type="submit" id="btn_submit">Se connecter</button>
                <button type="button" class="toggle-btn" onclick="toggleForm()">Pas encore de compte ? S'inscrire</button>
            </form>

            <!-- FORMULAIRE D'INSCRIPTION (CACHÉ PAR DÉFAUT) -->
            <form id="form_register" onsubmit="inscrireUtilisateur(event)" style="display: none;">
                <div class="champ">
                    <label>Nom complet :</label>
                    <input type="text" id="reg_nom" required placeholder="Votre nom">
                </div>

                <div class="champ">
                    <label>Adresse Email :</label>
                    <input type="email" id="reg_email" required placeholder="Votre email">
                </div>
                
                <div class="champ">
                    <label>Mot de passe :</label>
                    <input type="password" id="reg_mdp" required placeholder="Choisissez un mot de passe">
                </div>

                <div class="champ">
                    <label>Je suis un(e) :</label>
                    <select id="reg_role" required>
                        <option value="etudiant">Étudiant(e)</option>
                        <option value="enseignant">Enseignant(e)</option>
                        <option value="promoteur">Promoteur</option>
                    </select>
                </div>
                
                <p id="reg_msg" style="color:var(--danger); display:none; font-size:14px; text-align:center;"></p>
                
                <button type="submit" id="btn_register">Créer mon compte</button>
                <button type="button" class="toggle-btn" onclick="toggleForm()">Déjà un compte ? Se connecter</button>
            </form>
            
            <div class="footer">
                Projet réalisé par ONANA GREGOIRE LEGRAND (24G2060)
            </div>
        </div>
    </div>

    <!-- On charge notre javascript a la fin -->
    <script src="assets/js/auth.js"></script>
</body>
</html>
